---
all:
  children:
    # -------------------------------------------------------
    # HAProxy - 외부 트래픽 수신 + Reverse Proxy + Tailscale
    # Jenkins(AWS) → Tailscale IP로 직접 SSH 접속
    # -------------------------------------------------------
    haproxy:
      hosts:
        on-prem-haproxy:
          ansible_host: 100.101.249.121 # Tailscale IP (Jenkins에서 접근 가능)
          haproxy_public_ip: 192.168.10.3 # VMware Public 서브넷
          haproxy_private_ip: 192.168.20.2 # VMware Private 서브넷

    # -------------------------------------------------------
    # WEB/WAS - Spring Boot 서버
    # HAProxy가 Tailscale subnet router (192.168.20.0/24 advertise)
    # → Jenkins 커널이 tailscale0로 라우팅 → ProxyJump 불필요
    # -------------------------------------------------------
    webwas:
      hosts:
        on-prem-webwas:
          ansible_host: 192.168.20.12

    # -------------------------------------------------------
    # DB - MySQL 8.0 서버
    # -------------------------------------------------------
    db:
      hosts:
        on-prem-db:
          ansible_host: 192.168.20.20
