---
all:
  children:
    # -------------------------------------------------------
    # HAProxy - Phase 1 환경 (초기 구축된 온프레미스)
    # Jenkins(AWS) → Tailscale IP로 직접 SSH 접속
    # -------------------------------------------------------
    haproxy:
      hosts:
        on-prem-haproxy:
          ansible_host: 100.105.181.80 # Phase 1 Tailscale IP
          haproxy_public_ip: 192.168.10.3
          haproxy_private_ip: 192.168.20.2

    # -------------------------------------------------------
    # WEB/WAS - Spring Boot 서버
    # HAProxy가 Tailscale subnet router(192.168.20.0/24)로 설정되어
    # Jenkins가 직접 사설 IP로 접근 가능. ProxyJump 불필요.
    # -------------------------------------------------------
    webwas:
      hosts:
        on-prem-webwas:
          ansible_host: 192.168.20.12

    # -------------------------------------------------------
    # DB - MySQL 8.0 서버
    # -------------------------------------------------------
    db:
      hosts:
        on-prem-db:
          ansible_host: 192.168.20.20
