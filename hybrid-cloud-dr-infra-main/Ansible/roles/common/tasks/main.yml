---
# ===========================================================
# 공통 설정 - 모든 온프레미스 서버에 적용
# ===========================================================

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Update all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true

- name: Install essential packages
  ansible.builtin.dnf:
    name:
      - vim
      - curl
      - wget
      - tar
      - unzip
      - net-tools
      - bind-utils
      - firewalld
      - python3-pip
    state: present

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true

- name: Set SELinux to permissive
  ansible.posix.selinux:
    state: permissive
    policy: targeted
  when: ansible_selinux.status == "enabled"

- name: Install chrony for NTP
  ansible.builtin.dnf:
    name: chrony
    state: present

- name: Start and enable chronyd
  ansible.builtin.systemd:
    name: chronyd
    state: started
    enabled: true
