---
# ===========================================================
# HAProxy 설치 및 설정
# ===========================================================

- name: Install HAProxy
  ansible.builtin.dnf:
    name: haproxy
    state: present

- name: Deploy HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: haproxy -f %s -c -q
  notify: Restart HAProxy

- name: Allow HAProxy to bind to any port (SELinux)
  ansible.posix.seboolean:
    name: haproxy_connect_any
    state: true
    persistent: true
  when: ansible_selinux.status == "enabled"

- name: Open HTTP port
  ansible.posix.firewalld:
    port: "{{ haproxy_frontend_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Open HTTPS port
  ansible.posix.firewalld:
    port: "{{ haproxy_frontend_https_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Open HAProxy stats port
  ansible.posix.firewalld:
    port: "{{ haproxy_stats_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Start and enable HAProxy
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: true
