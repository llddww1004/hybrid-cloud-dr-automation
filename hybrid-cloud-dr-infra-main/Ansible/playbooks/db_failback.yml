---
# ============================================================
# db_failback.yml — Phase 3 Failback: AWS RDS → 온프레미스 MySQL
#
# 배경:
#   Phase 2 Failover 동안 AWS RDS가 모든 쓰기 트래픽을 받았음.
#   Failback 시 이 최신 데이터를 온프레미스 MySQL로 되돌려야 함.
#
# 네트워크 제약:
#   - 온프렘 DB(192.168.20.20)는 Tailscale 미설치
#   - HAProxy subnet router는 inbound-only (outbound 경로 없음)
#   → 온프렘 DB에서 RDS로 직접 outbound 불가
#   → Jenkins가 양쪽(AWS VPC + Tailscale subnet router)에 접근 가능하므로 중개
#
# 실행 전제:
#   1) Jenkins가 미리 실행: mysqldump -h <RDS> -u admin appdb > dump.sql
#   2) site.yml로 온프렘 3개 VM 프로비저닝 완료 (MySQL 기동, logistics DB 생성)
#
# 실행 방법:
#   ansible-playbook -i inventories/on-premise/hosts.yml \
#     playbooks/db_failback.yml \
#     -e "dump_src=/var/lib/jenkins/workspace/<job>/dump.sql"
#
# DB 이름 매핑:
#   AWS RDS      : appdb
#   온프레미스    : logistics  (mysql_databases[0].name)
#   → dump 파일에 DB 이름이 없으므로 (mysqldump 기본) restore 시 DB 명 지정만으로 매핑 완료
# ============================================================

- name: "[Phase 3] DB Failback - RDS dump restore to on-premise MySQL"
  hosts: db
  become: true
  vars:
    onprem_db_name: "{{ mysql_databases[0].name }}"
    dump_remote: /tmp/failback_dump.sql
    webwas_host: "{{ groups['webwas'][0] }}"

  tasks:

    # --------------------------------------------------------
    # 0. 전제 검증
    # --------------------------------------------------------
    - name: "[0/4] Validate dump_src variable is provided"
      ansible.builtin.fail:
        msg: "dump_src must be provided via -e (e.g., -e dump_src=/path/to/dump.sql)"
      when: dump_src is not defined or (dump_src | length) == 0

    - name: "[0/4] Verify dump file exists on Ansible controller"
      ansible.builtin.stat:
        path: "{{ dump_src }}"
      delegate_to: localhost
      become: false
      register: dump_stat

    - name: "[0/4] Fail if dump file is missing or empty"
      ansible.builtin.fail:
        msg: "dump_src not found or empty: {{ dump_src }}"
      when: (not dump_stat.stat.exists) or (dump_stat.stat.size | int) == 0

    # --------------------------------------------------------
    # 1. dump 파일을 DB VM으로 전송
    # --------------------------------------------------------
    - name: "[1/4] Copy dump.sql to onprem DB VM"
      ansible.builtin.copy:
        src: "{{ dump_src }}"
        dest: "{{ dump_remote }}"
        owner: root
        group: root
        mode: "0600"

    - name: "[1/4] Show dump file info on DB VM"
      ansible.builtin.shell: |
        ls -lh {{ dump_remote }}
        echo "---"
        wc -l {{ dump_remote }}
      register: dump_info
      changed_when: false

    - name: "[1/4] Print dump file info"
      ansible.builtin.debug:
        var: dump_info.stdout_lines

    # --------------------------------------------------------
    # 2. Restore into onprem MySQL
    #    - MYSQL_PWD env: 비밀번호를 프로세스 목록에 노출하지 않음
    #    - DB 이름을 명령줄에서 지정 (dump 파일 안에는 DB 이름 없음)
    #    - mysqldump에 --add-drop-table 옵션이 들어있으므로
    #      기존 빈 테이블(Hibernate ddl-auto=update로 생성된) 덮어쓰기 안전
    # --------------------------------------------------------
    - name: "[2/4] Restore dump into {{ onprem_db_name }} database"
      ansible.builtin.shell: >
        mysql -u root {{ onprem_db_name }} < {{ dump_remote }}
      environment:
        MYSQL_PWD: "{{ mysql_root_password }}"
      no_log: true

    - name: "[2/4] Remove dump file after restore (security)"
      ansible.builtin.file:
        path: "{{ dump_remote }}"
        state: absent

    # --------------------------------------------------------
    # 3. 검증: 테이블 목록 + 행 수 조회
    # --------------------------------------------------------
    - name: "[3/4] Query restored tables"
      ansible.builtin.shell: >
        mysql -u root {{ onprem_db_name }}
        -e "SELECT TABLE_NAME, TABLE_ROWS
            FROM information_schema.TABLES
            WHERE TABLE_SCHEMA = '{{ onprem_db_name }}'
            ORDER BY TABLE_NAME;"
      environment:
        MYSQL_PWD: "{{ mysql_root_password }}"
      register: tables_result
      changed_when: false

    - name: "[3/4] Show restored tables"
      ansible.builtin.debug:
        var: tables_result.stdout_lines

    # --------------------------------------------------------
    # 4. Spring Boot 재시작 (HikariCP 커넥션 풀 리프레시)
    #    site.yml 이 빈 DB 상태에서 Spring Boot를 기동시켰을 수 있음
    #    (Hibernate ddl-auto=update가 만든 빈 테이블을 캐시 중).
    #    데이터 restore 후 재시작해야 커넥션 풀과 1차 캐시가 갱신됨.
    # --------------------------------------------------------
    - name: "[4/4] Restart Spring Boot service on WEBWAS"
      ansible.builtin.systemd:
        name: "{{ app_service_name }}"
        state: restarted
      delegate_to: "{{ webwas_host }}"

    - name: "[4/4] Wait for Spring Boot /actuator/health = 200"
      ansible.builtin.uri:
        url: "http://localhost:8080/actuator/health"
        status_code: 200
      delegate_to: "{{ webwas_host }}"
      register: health_check
      retries: 30
      delay: 3
      until: health_check.status == 200
