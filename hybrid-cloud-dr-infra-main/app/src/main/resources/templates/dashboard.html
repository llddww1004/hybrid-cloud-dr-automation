<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사내 물류 관리 시스템</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f5f6fa; }
        .brand { font-weight: 700; letter-spacing: -0.5px; }
        .card { border: none; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06); }
        .card-title { font-size: 0.9rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; }
        .kpi { font-size: 1.75rem; font-weight: 600; color: #0f172a; }
        .table thead { background: #f1f5f9; }
        .badge-in { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
        <span class="navbar-brand brand mb-0">📦 사내 물류 관리 시스템</span>
        <span class="text-muted small">Logistics Dashboard</span>
    </div>
</nav>

<main class="container py-4">

    <div th:if="${flash}" class="alert alert-success py-2" th:text="${flash}"></div>
    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <!-- KPI -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card p-3">
                <div class="card-title">품목 수</div>
                <div class="kpi" th:text="${#lists.size(products)}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3">
                <div class="card-title">총 재고</div>
                <div class="kpi"
                     th:text="${#aggregates.sum(products.![quantity])}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3">
                <div class="card-title">최근 7일 입고</div>
                <div class="kpi"
                     th:text="${#aggregates.sum(chart.inbound)}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3">
                <div class="card-title">최근 7일 출고</div>
                <div class="kpi"
                     th:text="${#aggregates.sum(chart.outbound)}">0</div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card p-3 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0">일별 입출고 추이 (최근 7일)</h6>
        </div>
        <canvas id="movementChart" height="90"></canvas>
    </div>

    <div class="row g-3">
        <!-- Product table -->
        <div class="col-lg-7">
            <div class="card p-3 h-100">
                <h6 class="mb-3">재고 목록</h6>
                <div class="table-responsive">
                    <table class="table table-sm align-middle mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>상품</th>
                            <th>분류</th>
                            <th class="text-end">재고</th>
                            <th>위치</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${products}">
                            <td class="text-muted" th:text="${p.id}">1</td>
                            <td th:text="${p.name}">상품명</td>
                            <td><span class="badge bg-light text-dark" th:text="${p.category}">분류</span></td>
                            <td class="text-end fw-semibold" th:text="${p.quantity}">0</td>
                            <td class="text-muted" th:text="${p.location}">A-01</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="5" class="text-center text-muted py-3">등록된 상품이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Movement form + recent list -->
        <div class="col-lg-5">
            <div class="card p-3 mb-3">
                <h6 class="mb-3">입출고 기록</h6>
                <form th:action="@{/movements}" method="post" class="row g-2">
                    <div class="col-12">
                        <select name="productId" class="form-select form-select-sm" required>
                            <option value="" disabled selected>상품 선택</option>
                            <option th:each="p : ${products}"
                                    th:value="${p.id}"
                                    th:text="${p.name + ' (재고 ' + p.quantity + ')'}">상품</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <select name="movementType" class="form-select form-select-sm" required>
                            <option value="IN">입고</option>
                            <option value="OUT">출고</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <input type="number" name="quantity" class="form-control form-control-sm"
                               min="1" placeholder="수량" required>
                    </div>
                    <div class="col-12">
                        <input type="text" name="note" class="form-control form-control-sm" placeholder="메모 (선택)">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-dark btn-sm w-100">기록</button>
                    </div>
                </form>
            </div>

            <div class="card p-3">
                <h6 class="mb-3">최근 입출고</h6>
                <div class="table-responsive" style="max-height: 320px; overflow-y: auto;">
                    <table class="table table-sm mb-0">
                        <thead>
                        <tr>
                            <th>일시</th>
                            <th>상품</th>
                            <th>구분</th>
                            <th class="text-end">수량</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="m : ${movements}">
                            <td class="text-muted small"
                                th:text="${#temporals.format(m.movementDate, 'MM-dd HH:mm')}">04-19 10:00</td>
                            <td th:text="${m.product.name}">상품</td>
                            <td>
                                <span th:if="${m.movementType.name() == 'IN'}" class="badge badge-in">입고</span>
                                <span th:if="${m.movementType.name() == 'OUT'}" class="badge badge-out">출고</span>
                            </td>
                            <td class="text-end" th:text="${m.quantity}">0</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(movements)}">
                            <td colspan="4" class="text-center text-muted py-3">최근 기록이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const chartData = /*[[${chart}]]*/ {labels: [], inbound: [], outbound: []};
    const ctx = document.getElementById('movementChart');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: chartData.labels,
            datasets: [
                {
                    label: '입고',
                    data: chartData.inbound,
                    borderColor: '#16a34a',
                    backgroundColor: 'rgba(22, 163, 74, 0.12)',
                    tension: 0.3,
                    fill: true
                },
                {
                    label: '출고',
                    data: chartData.outbound,
                    borderColor: '#dc2626',
                    backgroundColor: 'rgba(220, 38, 38, 0.12)',
                    tension: 0.3,
                    fill: true
                }
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
        }
    });
    /*]]>*/
</script>
</body>
</html>
